<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PixelBead - 拼豆图案生成器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh;display:flex;flex-direction:column}
header{background:#fff;border-bottom:1px solid #e5e5e5;padding:16px 24px;text-align:center}
header h1{font-size:24px;font-weight:700}
header h1 span{color:#ff6b6b}
header .sub{color:#86868b;font-size:14px;margin-top:4px}
header .powered{margin-top:6px}
header .powered a{display:inline-flex;align-items:center;gap:4px;text-decoration:none;color:#86868b;font-size:12px}
header .powered img{width:16px;height:16px;border-radius:4px}
.container{max-width:1400px;margin:0 auto;padding:20px;flex:1;width:100%}

/* Upload */
.upload-zone{border:2px dashed #d2d2d7;border-radius:16px;padding:40px;text-align:center;cursor:pointer;transition:all .2s;background:#fff;margin-bottom:20px}
.upload-zone:hover,.upload-zone.drag-over{border-color:#ff6b6b;background:#fff5f5}
.upload-zone .icon{font-size:48px;margin-bottom:8px}
.upload-zone p{color:#86868b;font-size:15px}
.upload-zone input{display:none}
.upload-zone.has-image{padding:16px;border-style:solid;border-color:#e5e5e5}
.upload-zone.has-image .upload-info{display:flex;align-items:center;gap:12px;justify-content:center}
.upload-zone.has-image .thumb{width:48px;height:48px;border-radius:8px;object-fit:cover}
.upload-zone.has-image .meta{text-align:left;font-size:13px;color:#86868b}
.upload-zone.has-image .meta .fname{color:#1d1d1f;font-weight:600}
.upload-zone.has-image .change-btn{margin-left:12px;padding:6px 14px;background:#f0f0f5;border:none;border-radius:8px;font-size:13px;cursor:pointer;color:#1d1d1f}

/* Crop UI */
.crop-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.crop-dialog{background:#fff;border-radius:16px;max-width:90vw;max-height:90vh;overflow:hidden;display:flex;flex-direction:column}
.crop-header{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e5e5e5}
.crop-header h3{font-size:16px;font-weight:700}
.crop-header .crop-hint{font-size:12px;color:#86868b}
.crop-body{position:relative;overflow:hidden;cursor:default;display:flex;align-items:center;justify-content:center;background:#1a1a1a;max-height:70vh}
.crop-body canvas{display:block}
.crop-actions{padding:12px 20px;display:flex;gap:8px;justify-content:flex-end;border-top:1px solid #e5e5e5}

/* Brand tabs */
.brand-tabs{display:flex;gap:0;background:#fff;border-radius:12px;overflow:hidden;margin-bottom:16px;border:1px solid #e5e5e5}
.brand-tab{flex:1;padding:12px 8px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:#86868b;transition:all .15s;border:none;background:transparent}
.brand-tab:hover{background:#f5f5f7}
.brand-tab.active{background:#ff6b6b;color:#fff}
.brand-tab .bname{display:block;font-size:14px}
.brand-tab .binfo{display:block;font-size:11px;font-weight:400;opacity:.7;margin-top:2px}

/* Settings bar */
.settings-bar{display:flex;gap:16px;align-items:center;flex-wrap:wrap;background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:16px;border:1px solid #e5e5e5;font-size:13px}
.settings-bar label{display:flex;align-items:center;gap:4px;cursor:pointer;color:#555}
.settings-bar .sep{width:1px;height:20px;background:#e5e5e5}
.settings-bar .range-group{display:flex;align-items:center;gap:6px}
.settings-bar .range-group input[type=range]{width:100px}
.settings-bar .range-val{font-weight:600;min-width:24px}

/* Preview grid */
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.preview-card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e5e5e5;transition:box-shadow .2s}
.preview-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}
.preview-card .card-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f0f0f0}
.preview-card .card-title{font-size:15px;font-weight:700}
.preview-card .card-meta{font-size:12px;color:#86868b}
.preview-card .card-canvas-wrap{padding:12px;text-align:center;background:#fafafa;min-height:120px;display:flex;align-items:center;justify-content:center}
.preview-card canvas{max-width:100%;height:auto;image-rendering:pixelated;border-radius:4px}
.preview-card .card-footer{padding:10px 16px;display:flex;gap:8px;align-items:center;border-top:1px solid #f0f0f0;flex-wrap:wrap}
.preview-card .color-dots{display:flex;gap:2px;flex:1;flex-wrap:wrap}
.preview-card .color-dot{width:10px;height:10px;border-radius:2px;border:1px solid rgba(0,0,0,.1)}
.btn-sm{padding:5px 12px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-dl{background:#ff6b6b;color:#fff}.btn-dl:hover{background:#e55a5a}
.btn-pdf{background:#e5e5ea;color:#1d1d1f}.btn-pdf:hover{background:#d1d1d6}

/* Detail modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;max-width:95vw;max-height:90vh;overflow:auto;width:1000px}
.modal-header{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e5e5e5;position:sticky;top:0;background:#fff;z-index:1;border-radius:16px 16px 0 0}
.modal-header h3{font-size:18px}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#86868b;padding:4px 8px}
.modal-body{padding:20px;display:flex;gap:20px;flex-wrap:wrap}
.modal-canvas{flex:1;min-width:300px;text-align:center}
.modal-canvas canvas{max-width:100%;height:auto;image-rendering:pixelated}
.modal-materials{width:300px;max-height:500px;overflow-y:auto}
.modal-materials h4{margin-bottom:8px;font-size:14px}
.mat-summary{font-size:13px;color:#86868b;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
.mat-row{display:flex;align-items:center;gap:6px;padding:4px 6px;border-bottom:1px solid #f5f5f5;font-size:12px;cursor:pointer;border-radius:4px;transition:background .15s}
.mat-row:hover{background:#f5f5f7}
.mat-row.mat-active{background:#fff0f0;border-color:#ffd0d0}
.mat-swatch{width:16px;height:16px;border-radius:3px;border:1px solid #e5e5e5;flex-shrink:0}
.mat-code{font-weight:600;width:44px}
.mat-name{flex:1;color:#86868b}
.mat-count{font-weight:600;width:44px;text-align:right}
.mat-row .mat-focus-icon{width:16px;text-align:center;font-size:11px;color:#ff6b6b;flex-shrink:0;opacity:0;transition:opacity .15s}
.mat-row:hover .mat-focus-icon{opacity:.5}
.mat-row.mat-active .mat-focus-icon{opacity:1}
.modal-actions{padding:12px 20px;border-top:1px solid #e5e5e5;display:flex;gap:8px;justify-content:flex-end}
.btn-md{padding:8px 20px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}

/* Loading */
.loading-bar{height:3px;background:#ff6b6b;position:fixed;top:0;left:0;z-index:999;transition:width .3s;border-radius:0 2px 2px 0}
.card-loading{display:flex;align-items:center;justify-content:center;padding:40px;color:#86868b;font-size:13px}
.card-loading .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#ff6b6b;margin:0 2px;animation:bounce .6s ease-in-out infinite}
.card-loading .dot:nth-child(2){animation-delay:.15s}
.card-loading .dot:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* Placeholder */
.empty-state{text-align:center;padding:60px 20px;color:#86868b}
.empty-state .icon{font-size:64px;margin-bottom:12px}
.empty-state p{font-size:16px}

footer{text-align:center;padding:16px;color:#86868b;font-size:13px;border-top:1px solid #e5e5e5;background:#fff;margin-top:auto}
footer a{color:#ff6b6b;text-decoration:none}
footer .ft-brand{display:inline-flex;align-items:center;gap:5px;text-decoration:none;color:#1d1d1f;font-weight:600}
footer .ft-brand img{width:20px;height:20px;border-radius:5px}

@media(max-width:768px){.preview-grid{grid-template-columns:1fr 1fr}.brand-tab .binfo{display:none}.modal-body{flex-direction:column}.modal-materials{width:100%}.settings-bar{gap:8px}}
@media(max-width:480px){.preview-grid{grid-template-columns:1fr}.brand-tabs{flex-wrap:wrap}}
</style>
</head>
<body>
<header>
<h1>🎨 Pixel<span>Bead</span></h1>
<p class="sub">拼豆图案生成器 — 上传图片，即刻预览多种尺寸</p>
<p class="powered"><a href="https://autoglm.zhipuai.cn/autoclaw/" target="_blank"><img src="autoclaw-logo.png" alt="AutoClaw"> Powered by AutoClaw</a></p>
</header>
<div class="container">

<div class="upload-zone" id="dropZone">
<div class="icon">📸</div>
<p>拖拽图片到这里，或点击上传</p>
<input type="file" id="fileInput" accept="image/*">
</div>

<div id="mainUI" style="display:none">
<div class="brand-tabs" id="brandTabs"></div>
<div class="settings-bar">
<div class="range-group">
<span>最大颜色</span>
<input type="range" id="maxColors" min="5" max="80" value="30">
<span class="range-val" id="maxColorsVal">30</span>
</div>
<div class="sep"></div>
<label><input type="checkbox" id="outline" checked> 描边</label>
<label><input type="checkbox" id="noiseClean" checked> 降噪</label>
<label><input type="checkbox" id="cleanMode"> 纯净</label>
</div>
<div class="preview-grid" id="previewGrid"></div>
</div>

<div class="empty-state" id="emptyState">
<div class="icon">👆</div>
<p>上传一张图片，立即查看拼豆效果</p>
</div>
</div>

<!-- Crop overlay -->
<div id="cropOverlay" class="crop-overlay" style="display:none">
<div class="crop-dialog">
<div class="crop-header">
<h3>裁剪为正方形</h3>
<span class="crop-hint">拖拽移动裁剪框，拖角缩放</span>
</div>
<div class="crop-body" id="cropBody">
<canvas id="cropCanvas"></canvas>
</div>
<div class="crop-actions">
<button class="btn-md btn-pdf" onclick="cancelCrop()">取消</button>
<button class="btn-md btn-dl" onclick="confirmCrop()">确认裁剪</button>
</div>
</div>
</div>

<div id="modalBg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
<div class="modal">
<div class="modal-header">
<h3 id="modalTitle"></h3>
<button class="modal-close" onclick="closeModal()">✕</button>
</div>
<div class="modal-body">
<div class="modal-canvas"><canvas id="modalCanvas"></canvas></div>
<div class="modal-materials">
<h4>🧱 材料清单</h4>
<div class="mat-summary" id="modalSummary"></div>
<div id="modalMatList"></div>
</div>
</div>
<div class="modal-actions">
<button class="btn-md btn-pdf" onclick="downloadPdf()">下载 PDF</button>
<button class="btn-md btn-dl" onclick="downloadPng()">下载 PNG</button>
</div>
</div>
</div>

<div class="loading-bar" id="loadingBar" style="width:0;opacity:0"></div>

<footer>
<a href="https://autoglm.zhipuai.cn/autoclaw/" target="_blank" class="ft-brand">
<img src="autoclaw-logo.png" alt="AutoClaw"> AutoClaw
</a>
<span style="margin:0 8px;color:#d2d2d7">·</span>
<a href="https://github.com/Starrylyn/autoclaw-pixelbead-cli" target="_blank">GitHub</a>
<span style="margin:0 8px;color:#d2d2d7">·</span>
<a href="https://www.npmjs.com/package/autoclaw-pixelbead-cli" target="_blank">npm</a>
</footer>

      while(q.length){const[cx,cy]=q.shift();reg.push([cx,cy]);for(const[dx,dy]of[[-1,0],[1,0],[0,-1],[0,1]]){const nx=cx+dx,ny=cy+dy;if(nx>=0&&nx<size&&ny>=0&&ny<size&&!vis[ny][nx]&&grid[ny][nx].code===code){vis[ny][nx]=1;q.push([nx,ny])}}}
      if(reg.length<thr)for(const[rx,ry]of reg){const nb=[];for(const[dx,dy]of[[-1,0],[1,0],[0,-1],[0,1]]){const nx=rx+dx,ny=ry+dy;if(nx>=0&&nx<size&&ny>=0&&ny<size&&grid[ny][nx].code!==code)nb.push(grid[ny][nx])}if(nb.length)grid[ry][rx]=nb[Math.floor(nb.length/2)]}
    }
    counts.clear();for(let y=0;y<size;y++)for(let x=0;x<size;x++)counts.set(grid[y][x].code,(counts.get(grid[y][x].code)||0)+1);
  }
  if(doOutline){
    const og=grid.map(r=>[...r]);
    for(let y=0;y<size;y++)for(let x=0;x<size;x++){
      const c=grid[y][x];let border=false;
      for(const[dx,dy]of[[-1,0],[1,0],[0,-1],[0,1]]){const nx=x+dx,ny=y+dy;if(nx>=0&&nx<size&&ny>=0&&ny<size&&grid[ny][nx].code!==c.code){border=true;break}}
      if(border)og[y][x]=findNearest(Math.max(0,c.r-30),Math.max(0,c.g-30),Math.max(0,c.b-30),palette);
    }
    for(let y=0;y<size;y++)for(let x=0;x<size;x++)grid[y][x]=og[y][x];
    counts.clear();for(let y=0;y<size;y++)for(let x=0;x<size;x++)counts.set(grid[y][x].code,(counts.get(grid[y][x].code)||0)+1);
  }
  const flatGrid=[];for(let y=0;y<size;y++)for(let x=0;x<size;x++){const c=grid[y][x];flatGrid.push(c.code,c.hex,c.nameCn,c.r,c.g,c.b)}
  self.postMessage({id,size,flatGrid,colorCounts:[...counts.entries()]});
};
`;
const workerBlob=new Blob([WORKER_CODE],{type:'application/javascript'});
const workerUrl=URL.createObjectURL(workerBlob);
const worker=new Worker(workerUrl);
const workerCallbacks={};let workerIdSeq=0;
worker.onmessage=function(e){const{id}=e.data;if(workerCallbacks[id]){workerCallbacks[id](e.data);delete workerCallbacks[id]}};
function workerProcess(size,pixels,brandColors,maxColors,doOutline,doNoise){
  return new Promise(resolve=>{
    const id=++workerIdSeq;
    workerCallbacks[id]=resolve;
    worker.postMessage({id,size,pixels:Array.from(pixels),brandColors,maxColors,doOutline,doNoise});
  });
}

// ===== MAIN THREAD HELPERS =====
function hexToRgb(hex){const n=parseInt(hex.slice(1),16);return{r:(n>>16)&255,g:(n>>8)&255,b:n&255}}
const paletteCache={};
function getPalette(name){
  if(paletteCache[name])return paletteCache[name];
  const p=PALETTES[name];
  const REF_X=95.047,REF_Y=100,REF_Z=108.883,EPS=.008856,KAP=903.3;
  function rgbToLab(r,g,b){let rr=r/255,gg=g/255,bb=b/255;rr=rr>.04045?Math.pow((rr+.055)/1.055,2.4):rr/12.92;gg=gg>.04045?Math.pow((gg+.055)/1.055,2.4):gg/12.92;bb=bb>.04045?Math.pow((bb+.055)/1.055,2.4):bb/12.92;rr*=100;gg*=100;bb*=100;const x=rr*.4124564+gg*.3575761+bb*.1804375,y=rr*.2126729+gg*.7151522+bb*.072175,z=rr*.0193339+gg*.119192+bb*.9503041;let fx=x/REF_X,fy=y/REF_Y,fz=z/REF_Z;fx=fx>EPS?Math.cbrt(fx):(KAP*fx+16)/116;fy=fy>EPS?Math.cbrt(fy):(KAP*fy+16)/116;fz=fz>EPS?Math.cbrt(fz):(KAP*fz+16)/116;return{L:116*fy-16,a:500*(fx-fy),b:200*(fy-fz)}}
  paletteCache[name]=p.colors.map(c=>{const rgb=hexToRgb(c[3]);return{code:c[0],nameEn:c[1],nameCn:c[2],hex:c[3],...rgb,lab:rgbToLab(rgb.r,rgb.g,rgb.b)}});
  return paletteCache[name];
}

// ===== CROP =====
let cropState={img:null,sx:0,sy:0,sSize:0,scale:1,dragging:null,startX:0,startY:0,origSx:0,origSy:0,origSize:0};
function showCrop(img,dataUrl,fileName){
  sourceImage=img;
  if(img.width===img.height){croppedImage=img;updateUploadUI(dataUrl,fileName,img);document.getElementById('emptyState').style.display='none';document.getElementById('mainUI').style.display='block';generateAll();return}
  const overlay=document.getElementById('cropOverlay');overlay.style.display='flex';
  const canvas=document.getElementById('cropCanvas');
  const maxW=Math.min(600,window.innerWidth-80),maxH=Math.min(500,window.innerHeight-200);
  const scale=Math.min(maxW/img.width,maxH/img.height,1);
  canvas.width=Math.round(img.width*scale);canvas.height=Math.round(img.height*scale);
  const minDim=Math.min(img.width,img.height);
  cropState={img,sx:Math.round((img.width-minDim)/2),sy:Math.round((img.height-minDim)/2),sSize:minDim,scale,dragging:null,startX:0,startY:0,origSx:0,origSy:0,origSize:0,dataUrl,fileName};
  drawCrop();
}
function drawCrop(){
  const{img,sx,sy,sSize,scale}=cropState;
  const canvas=document.getElementById('cropCanvas'),ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0,canvas.width,canvas.height);
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,canvas.width,canvas.height);
  const cx=sx*scale,cy=sy*scale,cs=sSize*scale;
  ctx.clearRect(cx,cy,cs,cs);ctx.drawImage(img,0,0,canvas.width,canvas.height);
  ctx.save();ctx.beginPath();ctx.rect(0,0,canvas.width,canvas.height);ctx.rect(cx,cy,cs,cs);ctx.clip('evenodd');ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.restore();
  ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.strokeRect(cx,cy,cs,cs);
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=1;for(let i=1;i<3;i++){ctx.beginPath();ctx.moveTo(cx+cs*i/3,cy);ctx.lineTo(cx+cs*i/3,cy+cs);ctx.stroke();ctx.beginPath();ctx.moveTo(cx,cy+cs*i/3);ctx.lineTo(cx+cs,cy+cs*i/3);ctx.stroke()}
  const hs=8;ctx.fillStyle='#fff';for(const[hx,hy]of[[cx,cy],[cx+cs,cy],[cx,cy+cs],[cx+cs,cy+cs]]){ctx.fillRect(hx-hs/2,hy-hs/2,hs,hs)}
}
document.getElementById('cropCanvas').addEventListener('mousedown',e=>{
  const rect=e.target.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const{sx,sy,sSize,scale}=cropState,cx=sx*scale,cy=sy*scale,cs=sSize*scale,hs=12;
  cropState.startX=e.clientX;cropState.startY=e.clientY;cropState.origSx=sx;cropState.origSy=sy;cropState.origSize=sSize;
  if(Math.abs(mx-(cx+cs))<hs&&Math.abs(my-(cy+cs))<hs)cropState.dragging='resize-br';
  else if(Math.abs(mx-cx)<hs&&Math.abs(my-cy)<hs)cropState.dragging='resize-tl';
  else if(mx>=cx&&mx<=cx+cs&&my>=cy&&my<=cy+cs)cropState.dragging='move';
  e.preventDefault();
});
document.addEventListener('mousemove',e=>{
  if(!cropState.dragging)return;
  const dx=(e.clientX-cropState.startX)/cropState.scale,dy=(e.clientY-cropState.startY)/cropState.scale;
  const{img,origSx,origSy,origSize}=cropState;
  if(cropState.dragging==='move'){
    cropState.sx=Math.max(0,Math.min(img.width-cropState.sSize,origSx+dx));
    cropState.sy=Math.max(0,Math.min(img.height-cropState.sSize,origSy+dy));
  }else if(cropState.dragging==='resize-br'){
    const d=Math.max(dx,dy),newSize=Math.max(29,Math.min(img.width-origSx,img.height-origSy,origSize+d));
    cropState.sSize=Math.round(newSize);
  }else if(cropState.dragging==='resize-tl'){
    const d=Math.min(dx,dy),newSize=Math.max(29,origSize-d),actualD=origSize-newSize;
    cropState.sSize=Math.round(newSize);cropState.sx=Math.max(0,origSx+actualD);cropState.sy=Math.max(0,origSy+actualD);
  }
  drawCrop();
});
document.addEventListener('mouseup',()=>{cropState.dragging=null});
function confirmCrop(){
  const{img,sx,sy,sSize,dataUrl,fileName}=cropState;
  const off=document.createElement('canvas');off.width=sSize;off.height=sSize;
  off.getContext('2d').drawImage(img,sx,sy,sSize,sSize,0,0,sSize,sSize);
  const ci=new Image();ci.onload=()=>{
    croppedImage=ci;document.getElementById('cropOverlay').style.display='none';
    updateUploadUI(dataUrl,fileName,sourceImage);
    document.getElementById('emptyState').style.display='none';document.getElementById('mainUI').style.display='block';
    generateAll();
  };ci.src=off.toDataURL();
}
function cancelCrop(){document.getElementById('cropOverlay').style.display='none'}

// ===== RENDER PREVIEW =====
function renderPreviewCanvas(canvas,result,maxPx){
  const{grid,size}=result;const cell=Math.max(1,Math.floor(maxPx/size)),px=size*cell;
  canvas.width=px;canvas.height=px;const ctx=canvas.getContext('2d');
  for(let y=0;y<size;y++)for(let x=0;x<size;x++){ctx.fillStyle=grid[y][x].hex;ctx.fillRect(x*cell,y*cell,cell,cell)}
}

// ===== RENDER FULL CANVAS (with highlight support) =====
function renderFullCanvas(canvas,result,clean,hlSet){
  const{grid,size}=result;
  const cellSize=Math.max(8,Math.min(24,Math.floor(2400/size)));
  const margin=clean?4:30;
  const w=margin+size*cellSize+4,h=margin+size*cellSize+4;
  canvas.width=w;canvas.height=h;const ctx=canvas.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
  const hasHL=hlSet&&hlSet.size>0;
  for(let y=0;y<size;y++)for(let x=0;x<size;x++){
    const c=grid[y][x];
    if(hasHL&&!hlSet.has(c.code)){ctx.fillStyle='#e8e8e8';ctx.fillRect(margin+x*cellSize,margin+y*cellSize,cellSize,cellSize);ctx.fillStyle='rgba(200,200,200,0.3)';ctx.fillRect(margin+x*cellSize,margin+y*cellSize,cellSize,cellSize)}
    else{ctx.fillStyle=c.hex;ctx.fillRect(margin+x*cellSize,margin+y*cellSize,cellSize,cellSize)}
  }
  ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=.5;
  for(let i=0;i<=size;i++){ctx.beginPath();ctx.moveTo(margin+i*cellSize+.5,margin);ctx.lineTo(margin+i*cellSize+.5,margin+size*cellSize);ctx.stroke();ctx.beginPath();ctx.moveTo(margin,margin+i*cellSize+.5);ctx.lineTo(margin+size*cellSize,margin+i*cellSize+.5);ctx.stroke()}
  ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1.5;
  for(let i=29;i<size;i+=29){ctx.beginPath();ctx.moveTo(margin+i*cellSize,margin);ctx.lineTo(margin+i*cellSize,margin+size*cellSize);ctx.stroke();ctx.beginPath();ctx.moveTo(margin,margin+i*cellSize);ctx.lineTo(margin+size*cellSize,margin+i*cellSize);ctx.stroke()}
  if(!clean){
    ctx.fillStyle='#555';ctx.font=`${Math.min(11,cellSize-2)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='bottom';
    for(let i=0;i<size;i++)if((i+1)%5===0||i===0)ctx.fillText(String(i+1),margin+i*cellSize+cellSize/2,margin-3);
    ctx.textAlign='right';ctx.textBaseline='middle';
    for(let i=0;i<size;i++)if((i+1)%5===0||i===0)ctx.fillText(String(i+1),margin-4,margin+i*cellSize+cellSize/2);
    if(cellSize>=14){ctx.font=`${Math.max(6,cellSize/3)}px monospace`;ctx.textAlign='center';ctx.textBaseline='middle';for(let y=0;y<size;y++)for(let x=0;x<size;x++){const c=grid[y][x];if(hasHL&&!hlSet.has(c.code))continue;ctx.fillStyle=(c.r*.299+c.g*.587+c.b*.114)>128?'rgba(0,0,0,0.6)':'rgba(255,255,255,0.7)';ctx.fillText(c.code,margin+x*cellSize+cellSize/2,margin+y*cellSize+cellSize/2)}}
  }
}

// ===== RECONSTRUCT GRID FROM WORKER FLAT DATA =====
function unflattenGrid(flatGrid,size){
  const grid=[];let i=0;
  for(let y=0;y<size;y++){const row=[];for(let x=0;x<size;x++){row.push({code:flatGrid[i],hex:flatGrid[i+1],nameCn:flatGrid[i+2],r:flatGrid[i+3],g:flatGrid[i+4],b:flatGrid[i+5]});i+=6}grid.push(row)}
  return grid;
}

// ===== GENERATE ALL SIZES (async via Worker) =====
async function generateAll(){
  if(!croppedImage)return;
  const gridEl=document.getElementById('previewGrid');
  const bar=document.getElementById('loadingBar');
  bar.style.opacity='1';bar.style.width='5%';
  gridEl.innerHTML=SIZES.map(s=>`<div class="preview-card" id="card-${s.size}"><div class="card-header"><span class="card-title">${s.emoji} ${s.label}</span><span class="card-meta">${s.desc} · ${(s.size*s.size).toLocaleString()} 颗</span></div><div class="card-canvas-wrap" id="wrap-${s.size}"><div class="card-loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div><div class="card-footer" id="footer-${s.size}"></div></div>`).join('');
  allResults={};
  const maxColors=+document.getElementById('maxColors').value;
  const doOutline=document.getElementById('outline').checked;
  const doNoise=document.getElementById('noiseClean').checked;
  const brandColors=PALETTES[currentBrand].colors;
  for(let idx=0;idx<SIZES.length;idx++){
    const s=SIZES[idx];
    bar.style.width=`${10+idx/SIZES.length*90}%`;
    const off=document.createElement('canvas');off.width=s.size;off.height=s.size;
    const octx=off.getContext('2d');octx.imageSmoothingEnabled=true;octx.imageSmoothingQuality='high';
    octx.drawImage(croppedImage,0,0,s.size,s.size);
    const pixels=octx.getImageData(0,0,s.size,s.size).data;
    try{
      const r=await workerProcess(s.size,pixels,brandColors,maxColors,doOutline,doNoise);
      const grid=unflattenGrid(r.flatGrid,s.size);
      const colorCounts=new Map(r.colorCounts);
      const result={grid,size:s.size,colorCounts,brand:currentBrand};
      allResults[s.size]=result;
      const wrap=document.getElementById('wrap-'+s.size);
      const canvas=document.createElement('canvas');canvas.style.cursor='pointer';
      canvas.onclick=()=>openModal(s.size);
      renderPreviewCanvas(canvas,result,260);
      wrap.innerHTML='';wrap.appendChild(canvas);
      const sorted=[...colorCounts.entries()].sort((a,b)=>b[1]-a[1]);
      const pal=getPalette(currentBrand),pMap=Object.fromEntries(pal.map(c=>[c.code,c]));
      const dots=sorted.slice(0,20).map(([code])=>{const c=pMap[code];return c?`<div class="color-dot" style="background:${c.hex}" title="${code} ${c.nameCn}"></div>`:''}).join('');
      const extra=sorted.length>20?`<span style="font-size:11px;color:#86868b">+${sorted.length-20}</span>`:'';
      document.getElementById('footer-'+s.size).innerHTML=`<div class="color-dots">${dots}${extra}</div><span style="font-size:11px;color:#86868b;white-space:nowrap">${colorCounts.size}色</span><button class="btn-sm btn-dl" onclick="event.stopPropagation();openModal(${s.size})">详情</button>`;
    }catch(e){document.getElementById('wrap-'+s.size).innerHTML=`<span style="color:red;font-size:13px">出错: ${e.message}</span>`}
  }
  bar.style.width='100%';setTimeout(()=>{bar.style.opacity='0';bar.style.width='0'},500);
}

// ===== MODAL WITH HIGHLIGHT =====
function openModal(size){
  const result=allResults[size];if(!result)return;
  currentModal=result;highlightCodes.clear();
  const clean=document.getElementById('cleanMode')?document.getElementById('cleanMode').checked:false;
  const canvas=document.getElementById('modalCanvas');
  renderFullCanvas(canvas,result,clean,highlightCodes);
  const palette=getPalette(result.brand),pMap=Object.fromEntries(palette.map(c=>[c.code,c]));
  const total=size*size,boards=Math.ceil(size/29)**2;
  document.getElementById('modalTitle').textContent=`${size}×${size} · ${PALETTES[result.brand].brandCn}`;
  document.getElementById('modalSummary').innerHTML=`${total.toLocaleString()} 颗豆 · ${result.colorCounts.size} 色 · ${boards} 板 · ${PALETTES[result.brand].beadSize}<br><span style="font-size:11px;color:#ff6b6b">💡 点击颜色可多选高亮拼装位置</span>`;
  const sorted=[...result.colorCounts.entries()].sort((a,b)=>b[1]-a[1]);
  document.getElementById('modalMatList').innerHTML=sorted.map(([code,count])=>{const c=pMap[code];if(!c)return'';return`<div class="mat-row" data-code="${code}" onclick="toggleHighlight('${code}')"><div class="mat-focus-icon">🎯</div><div class="mat-swatch" style="background:${c.hex}"></div><span class="mat-code">${code}</span><span class="mat-name">${c.nameCn}</span><span class="mat-count">${count}</span></div>`}).join('');
  document.getElementById('modalBg').style.display='flex';
}
function toggleHighlight(code){
  if(!currentModal)return;
  const clean=document.getElementById('cleanMode')?document.getElementById('cleanMode').checked:false;
  if(highlightCodes.has(code)){highlightCodes.delete(code)}else{highlightCodes.add(code)}
  renderFullCanvas(document.getElementById('modalCanvas'),currentModal,clean,highlightCodes);
  document.querySelectorAll('#modalMatList .mat-row').forEach(r=>{r.classList.toggle('mat-active',highlightCodes.has(r.dataset.code))});
}
function closeModal(){document.getElementById('modalBg').style.display='none';highlightCodes.clear()}
function downloadPng(){
  if(!currentModal)return;
  const canvas=document.getElementById('modalCanvas');
  const a=document.createElement('a');a.download=`pixelbead-${currentModal.size}x${currentModal.size}.png`;a.href=canvas.toDataURL('image/png');a.click();
}
function downloadPdf(){
  if(!currentModal)return;const{jsPDF}=window.jspdf;const canvas=document.getElementById('modalCanvas');
  const pdf=new jsPDF({orientation:canvas.width>canvas.height?'l':'p',unit:'px',format:[canvas.width+40,canvas.height+80]});
  pdf.setFontSize(16);pdf.text(`PixelBead ${currentModal.size}x${currentModal.size} - ${PALETTES[currentModal.brand].brandCn}`,20,25);
  pdf.addImage(canvas.toDataURL('image/png'),'PNG',20,40,canvas.width,canvas.height);
  pdf.save(`pixelbead-${currentModal.size}x${currentModal.size}.pdf`);
}

// ===== UPLOAD =====
function updateUploadUI(dataUrl,fileName,img){
  const dz=document.getElementById('dropZone');dz.classList.add('has-image');
  dz.innerHTML=`<div class="upload-info"><img src="${dataUrl}" class="thumb"><div class="meta"><div class="fname">${fileName}</div>${img.width}×${img.height}</div><button class="change-btn" onclick="event.stopPropagation();document.getElementById('fileInput').click()">换一张</button></div>`;
}
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput');
dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0])});
fileInput.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0])});
function loadFile(file){
  const reader=new FileReader();
  reader.onload=e=>{const img=new Image();img.onload=()=>showCrop(img,e.target.result,file.name);img.src=e.target.result};
  reader.readAsDataURL(file);
}

document.getElementById('maxColors').addEventListener('input',e=>{document.getElementById('maxColorsVal').textContent=e.target.value});
document.getElementById('maxColors').addEventListener('change',()=>{if(croppedImage)generateAll()});
document.getElementById('outline').addEventListener('change',()=>{if(croppedImage)generateAll()});
document.getElementById('noiseClean').addEventListener('change',()=>{if(croppedImage)generateAll()});
</script>
